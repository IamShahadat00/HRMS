<div class="flex h-screen bg-gray-100">
  <!-- Sidebar -->
  <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-xl">
    <div class="p-6 text-2xl font-bold border-b border-slate-700">
      HRMS <span class="text-blue-400">Pro</span>
    </div>
    
    <nav class="flex-1 mt-6 px-4 space-y-2">
      <a routerLink="/dashboard/employees" routerLinkActive="bg-blue-600" 
         class="flex items-center p-3 rounded-lg hover:bg-slate-800 transition-colors">
        <i class="bi bi-people-fill mr-3"></i> Employees
      </a>
      <a routerLink="/dashboard/salary" routerLinkActive="bg-blue-600"
         class="flex items-center p-3 rounded-lg hover:bg-slate-800 transition-colors">
        <i class="bi bi-cash-stack mr-3"></i> Salary Management
      </a>
      <a routerLink="/dashboard/payroll" routerLinkActive="bg-blue-600"
         class="flex items-center p-3 rounded-lg hover:bg-slate-800 transition-colors">
        <i class="bi bi-calculator-fill mr-3"></i> Payroll
      </a>
    </nav>

    <div class="p-4 border-t border-slate-700">
      <button (click)="logout()" class="w-full flex items-center p-3 text-red-400 hover:bg-red-900/20 rounded-lg transition-all">
        <i class="bi bi-box-arrow-left mr-3"></i> Logout
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 flex flex-col overflow-hidden">
    <!-- Header -->
    <header class="h-16 bg-white shadow-sm flex items-center justify-between px-8">
      <h1 class="text-xl font-semibold text-gray-700">Management Console</h1>
      <div class="flex items-center space-x-4">
        <span class="text-sm text-gray-500">Welcome, Admin</span>
        <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold">
          A
        </div>
      </div>
    </header>
    <section class="flex-1 overflow-y-auto p-8">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>

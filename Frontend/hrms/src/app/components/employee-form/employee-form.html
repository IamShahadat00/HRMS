<div class="max-w-4xl mx-auto bg-white rounded-xl shadow-sm border border-gray-200">
  <!-- Header -->
  <div class="p-6 border-b border-gray-200">
    <h2 class="text-2xl font-bold text-gray-800">
      {{ isEditMode ? 'Edit Employee' : 'Add New Employee' }}
    </h2>
    <p class="text-gray-500">Enter the employee's professional and personal details.</p>
  </div>

  <!-- Form Start -->
  <form [formGroup]="employeeForm" (ngSubmit)="onSubmit()" class="p-8 space-y-6">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- First Name -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
        <input
          type="text"
          formControlName="firstName"
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all"
          [class.border-red-500]="
            employeeForm.get('firstName')?.invalid && employeeForm.get('firstName')?.touched
          "
        />
        <p
          *ngIf="employeeForm.get('firstName')?.invalid && employeeForm.get('firstName')?.touched"
          class="text-red-500 text-xs mt-1"
        >
          First name is required.
        </p>
      </div>

      <!-- Last Name -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
        <input
          type="text"
          formControlName="lastName"
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all"
          [class.border-red-500]="
            employeeForm.get('lastName')?.invalid && employeeForm.get('lastName')?.touched
          "
        />
      </div>

      <!-- Email -->
      <div class="md:col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input
          type="email"
          formControlName="email"
          placeholder="example@mail.com"
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all"
          [class.border-red-500]="
            employeeForm.get('email')?.invalid && employeeForm.get('email')?.touched
          "
        />
        <p
          *ngIf="employeeForm.get('email')?.invalid && employeeForm.get('email')?.touched"
          class="text-red-500 text-xs mt-1"
        >
          Please enter a valid email address.
        </p>
      </div>

      <!-- Phone Number -->
      <div class="md:col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
        <input
          type="text"
          formControlName="phone"
          placeholder="e.g. +8801700000000"
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all"
          [class.border-red-500]="
            employeeForm.get('phone')?.invalid && employeeForm.get('phone')?.touched
          "
        />
      </div>

      <!-- Position -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Position</label>
        <input
          type="text"
          formControlName="position"
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all"
          [class.border-red-500]="
            employeeForm.get('position')?.invalid && employeeForm.get('position')?.touched
          "
        />
      </div>

      <!-- Department -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Department</label>
        <select
          formControlName="departmentId"
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white transition-all"
        >
          <option [value]="1">Human Resources</option>
          <option [value]="2">IT Department</option>
          <option [value]="3">Finance</option>
          <option [value]="4">Sales</option>
          <option [value]="5">Operations</option>
        </select>
      </div>

      <!-- Account Number -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1"
          >Account Number (for Salary)</label
        >
        <input
          type="text"
          formControlName="accountNumber"
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all"
          [class.border-red-500]="
            employeeForm.get('accountNumber')?.invalid && employeeForm.get('accountNumber')?.touched
          "
        />
      </div>

      <!-- Active Status -->
      <div class="flex items-center space-x-3 pt-6">
        <input
          type="checkbox"
          formControlName="isActive"
          class="h-5 w-5 text-blue-600 rounded cursor-pointer"
        />
        <label class="text-sm font-medium text-gray-700 cursor-pointer">Currently Active</label>
      </div>
    </div>

    <!-- Phone Number -->
    <div class="md:col-span-2">
      <label class="block text-sm font-medium text-gray-700 mb-1">Home Address</label>
      <textarea
        formControlName="address"
        rows="2"
        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all"
        [class.border-red-500]="
          employeeForm.get('address')?.invalid && employeeForm.get('address')?.touched
        "
      >
      </textarea>
      <p
        *ngIf="employeeForm.get('address')?.invalid && employeeForm.get('address')?.touched"
        class="text-red-500 text-xs mt-1"
      >
        Address is required for payroll records.
      </p>
    </div>
    <!-- Buttons -->
    <div class="flex justify-end space-x-4 pt-6 border-t">
      <button
        type="button"
        routerLink="/dashboard/employees"
        class="px-6 py-2 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50 transition-all"
      >
        Cancel
      </button>
      <button
        type="submit"
        class="px-8 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 shadow-md transition-all font-bold"
      >
        {{ isEditMode ? 'Update Record' : 'Save Employee' }}
      </button>
    </div>
  </form>
</div>

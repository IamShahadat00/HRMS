<div class="min-h-screen bg-gray-100 flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8 animate-fade-in">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-gray-800">HRMS Portal</h2>
      <p class="text-gray-500 mt-2">Please sign in to your account</p>
    </div>

    <form (submit)="onLogin()" class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-700">Username</label>
        <input type="text" [(ngModel)]="loginData.userName" name="username" required
          class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Password</label>
        <input type="password" [(ngModel)]="loginData.password" name="password" required
          class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all">
      </div>

      <button type="submit" 
        class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition-colors shadow-md hover:shadow-lg">
        Sign In
      </button>
    </form>
    
    <div *ngIf="errorMessage" class="mt-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm text-center">
      {{ errorMessage }}
    </div>
  </div>
</div>

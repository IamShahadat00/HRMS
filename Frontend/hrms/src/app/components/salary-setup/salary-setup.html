<div class="max-w-3xl mx-auto">
  <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
    <div class="p-6 border-b bg-gray-50">
      <h2 class="text-2xl font-bold text-gray-800">Salary Configuration</h2>
      <p class="text-sm text-gray-500">Define the pay structure for this employee.</p>
    </div>

    <form [formGroup]="salaryForm" (ngSubmit)="onSubmit()" class="p-8 space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <!-- Base Salary -->
        <div class="md:col-span-2 bg-blue-50 p-4 rounded-lg border border-blue-100">
          <label class="block text-sm font-semibold text-blue-800 mb-1">Base Monthly Salary</label>
          <input type="number" formControlName="baseSalary" 
            class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-lg font-bold">
        </div>

        <!-- Allowances -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Medical Allowance</label>
          <input type="number" formControlName="medicalAllowance" class="w-full px-4 py-2 border rounded-lg outline-none">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Conveyance Allowance</label>
          <input type="number" formControlName="conveyanceAllowance" class="w-full px-4 py-2 border rounded-lg outline-none">
        </div>

        <!-- Bonus and Deductions -->
        <div>
          <label class="block text-sm font-medium text-green-700 mb-1">Performance Bonus</label>
          <input type="number" formControlName="otherBonuses" class="w-full px-4 py-2 border border-green-200 rounded-lg outline-none bg-green-50/30">
        </div>

        <div>
          <label class="block text-sm font-medium text-red-700 mb-1">Other Deductions (Insurance/Loan)</label>
          <input type="number" formControlName="deductions" class="w-full px-4 py-2 border border-red-200 rounded-lg outline-none bg-red-50/30">
        </div>
      </div>

      <div class="flex justify-end space-x-4 pt-6 border-t">
        <button type="button" routerLink="/dashboard/salary" class="px-6 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition-all">
          Cancel
        </button>
        <button type="submit" class="px-8 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 shadow-md transition-all font-bold">
          Save Settings
        </button>
      </div>
    </form>
  </div>
</div>
